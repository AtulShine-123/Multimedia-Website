<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0033;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#330066;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#660099;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0055;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#660022;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00fff2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006666;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7000ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#330066;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff0055;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff0055;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ff0055;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Sky Background -->
  <rect width="800" height="600" fill="url(#skyGradient)"/>
  
  <!-- Sun/Moon -->
  <circle cx="400" cy="150" r="80" fill="url(#sunGradient)"/>
  <circle cx="400" cy="150" r="60" fill="#ff0055" opacity="0.8"/>
  
  <!-- Stars -->
  <circle cx="100" cy="80" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="250" cy="50" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="150" cy="120" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="600" cy="90" r="2" fill="#ffffff" opacity="0.9"/>
  <circle cx="700" cy="60" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="550" cy="130" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="680" cy="110" r="1.2" fill="#ffffff" opacity="0.6"/>
  <circle cx="200" cy="40" r="1.8" fill="#ffffff" opacity="0.7"/>
  
  <!-- Mountain Layer 1 (Back) -->
  <polygon points="0,400 200,250 400,300 600,220 800,350 800,600 0,600" 
           fill="url(#mountainGradient3)" opacity="0.6"/>
  
  <!-- Mountain Layer 2 (Middle) -->
  <polygon points="0,450 150,320 350,280 550,340 700,260 800,400 800,600 0,600" 
           fill="url(#mountainGradient2)" opacity="0.8"/>
  
  <!-- Mountain Layer 3 (Front) -->
  <polygon points="0,500 100,380 300,340 500,420 650,350 800,480 800,600 0,600" 
           fill="url(#mountainGradient1)"/>
  
  <!-- Grid Lines for Synthwave Effect -->
  <g stroke="#ff0055" stroke-width="1" opacity="0.3" fill="none">
    <!-- Horizontal lines -->
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="520" x2="800" y2="520"/>
    <line x1="0" y1="540" x2="800" y2="540"/>
    <line x1="0" y1="560" x2="800" y2="560"/>
    <line x1="0" y1="580" x2="800" y2="580"/>
    
    <!-- Vertical lines with perspective -->
    <path d="M 100 500 L 120 600"/>
    <path d="M 200 500 L 230 600"/>
    <path d="M 300 500 L 340 600"/>
    <path d="M 400 500 L 450 600"/>
    <path d="M 500 500 L 560 600"/>
    <path d="M 600 500 L 670 600"/>
    <path d="M 700 500 L 780 600"/>
  </g>
  
  <!-- Highlight on mountains -->
  <polygon points="300,340 350,280 400,300 500,420" 
           fill="#ffffff" opacity="0.1"/>
  <polygon points="650,350 700,260 750,320 800,400" 
           fill="#ffffff" opacity="0.15"/>
</svg>
